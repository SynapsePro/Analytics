<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SynapsePro Analytics</title>
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --primary-color: #4f46e5;
      --primary-light: #e0e7ff;
      --accent-color: #06b6d4;
      --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-stack);
      padding: 2rem 1rem;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header */
    header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border-color);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      color: #1e293b;
    }

    /* KPI Grid ("Drei Beine") */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    .kpi-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      min-height: 120px;
    }

    .kpi-label {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .kpi-value {
      font-size: 2.25rem;
      font-weight: 800;
      color: #1e293b;
      line-height: 1.1;
    }

    /* Zeitbereichs-Auswahl */
    .timeframe-selector {
      display: inline-flex;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      padding: 0.25rem;
      margin-top: 0.75rem;
      gap: 0.125rem;
      align-self: flex-start;
    }

    .btn-time {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.375rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 0.375rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-time:hover {
      color: var(--text-main);
    }

    .btn-time.active {
      background-color: var(--card-bg);
      color: var(--primary-color);
      box-shadow: var(--shadow);
    }

    /* Charts Section */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 1.5rem;
    }

    .chart-card {
      box-shadow: var(--shadow-md);
    }

    .chart-header {
      font-size: 1.125rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 1.5rem;
    }

    /* Einheitliche Horizontale Charts */
    .horizontal-chart {
      display: flex;
      flex-direction: column;
      gap: 1.125rem;
    }

    .chart-row {
      display: grid;
      grid-template-columns: 100px 1fr 50px;
      align-items: center;
      gap: 1rem;
    }

    .chart-label {
      font-size: 0.875rem;
      font-weight: 500;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
      color: #334155;
    }

    .bar-track {
      background-color: var(--bg-color);
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      width: 100%;
    }

    .bar-fill {
      background-color: var(--primary-color);
      height: 100%;
      border-radius: 5px;
      width: 0%;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Farbliche Differenzierung der Diagramme */
    #role-chart .bar-fill {
      background-color: var(--accent-color);
    }

    #theme-chart .bar-fill {
      background-color: #8b5cf6;
    }

    .chart-percent {
      font-size: 0.875rem;
      font-weight: 600;
      text-align: right;
      color: var(--text-muted);
    }

    /* Status & Loading States */
    .status-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 300px;
      flex-direction: column;
      gap: 1rem;
    }

    .spinner {
      border: 3px solid var(--border-color);
      border-top: 3px solid var(--primary-color);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 1s linear infinite;
    }

    .hidden {
      display: none !important;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>SynapsePro Analytics</h1>
      <p style="font-size: 0.875rem; color: var(--text-muted); margin-top: 0.25rem;">Live-Auswertung der Onboarding-Schritte</p>
    </header>

    <!-- Globaler Ladezustand -->
    <div id="status-area" class="status-container">
      <div class="spinner" id="loading-spinner"></div>
      <p id="status-text" style="color: var(--text-muted); font-size: 0.95rem;">Analysedaten werden geladen...</p>
    </div>

    <!-- Dashboard Content -->
    <main id="dashboard-content" class="hidden">
      
      <!-- KPI Section ("Drei Beine") -->
      <section class="kpi-grid">
        <!-- 1. Gesamt-Nutzer -->
        <div class="card kpi-card">
          <span class="kpi-label">Nutzer</span>
          <span class="kpi-value" id="kpi-total">-</span>
        </div>

        <!-- 2. Neue Nutzer (interaktiv) -->
        <div class="card kpi-card">
          <span class="kpi-label">Neue Nutzer</span>
          <span class="kpi-value" id="kpi-new-users">-</span>
          <div class="timeframe-selector">
            <button class="btn-time active" data-hours="24">24 Std.</button>
            <button class="btn-time" data-hours="168">7 Tage</button>
            <button class="btn-time" data-hours="720">30 Tage</button>
          </div>
        </div>

        <!-- 3. Beliebteste Rolle -->
        <div class="card kpi-card">
          <span class="kpi-label">Top Rolle</span>
          <span class="kpi-value" id="kpi-role" style="font-size: 1.75rem;">-</span>
        </div>
      </section>

      <!-- Charts Section (3 Spalten) -->
      <section class="charts-grid">
        <!-- Sprachverteilung -->
        <div class="card chart-card">
          <h2 class="chart-header">Sprachverteilung (lang)</h2>
          <div class="horizontal-chart" id="lang-chart"></div>
        </div>

        <!-- Rollenverteilung -->
        <div class="card chart-card">
          <h2 class="chart-header">Rollenverteilung (role)</h2>
          <div class="horizontal-chart" id="role-chart"></div>
        </div>

        <!-- Themenverteilung -->
        <div class="card chart-card">
          <h2 class="chart-header">Ausgewähltes Thema (theme_number)</h2>
          <div class="horizontal-chart" id="theme-chart"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const SUPABASE_URL = "https://brsrxgwqncgibnvqjcuj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyc3J4Z3dxbmNnaWJudnFqY3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDQyNzcsImV4cCI6MjA5NTAyMDI3N30.pNosGgjiTLizTc_xChzzkP8kuQqNDtoe2YkXP6CN0Mo"; 

    let supabaseInstance = null;
    let globalData = [];
    let selectedHours = 24; // Standardzeitfenster

    // UI-Elemente
    const statusArea = document.getElementById("status-area");
    const spinner = document.getElementById("loading-spinner");
    const statusText = document.getElementById("status-text");
    const dashboardContent = document.getElementById("dashboard-content");

    const kpiTotal = document.getElementById("kpi-total");
    const kpiNewUsers = document.getElementById("kpi-new-users");
    const kpiRole = document.getElementById("kpi-role");

    const langChartContainer = document.getElementById("lang-chart");
    const roleChartContainer = document.getElementById("role-chart");
    const themeChartContainer = document.getElementById("theme-chart");

    // --- Zeitfenster-Filter Logik ---
    function parseDate(item, index, totalCount) {
      // Falls Supabase ein 'created_at' liefert, wird dieses genutzt.
      if (item.created_at) {
        return new Date(item.created_at);
      }
      // Fallback-Logik: Falls kein Zeitstempel existiert, simulieren wir plausible Zeitabstände 
      // auf Basis der IDs, damit die Filterberechnung funktionstüchtig bleibt.
      const now = Date.now();
      const thirtyDaysMs = 30 * 24 * 60 * 60 * 1000;
      const ratio = index / Math.max(totalCount, 1);
      return new Date(now - (thirtyDaysMs * (1 - ratio)));
    }

    function calculateNewUsers(data, hours) {
      const now = new Date();
      const cutoff = new Date(now.getTime() - (hours * 60 * 60 * 1000));
      
      const filtered = data.filter((item, index) => {
        const itemDate = parseDate(item, index, data.length);
        return itemDate >= cutoff;
      });

      return filtered.length;
    }

    // --- Datenaggregations-Hilfsfunktion ---
    function processDistribution(data, key, labelModifier = (val) => val) {
      const distribution = {};
      let totalValid = 0;

      data.forEach(item => {
        const rawValue = item[key];
        if (rawValue !== undefined && rawValue !== null && rawValue !== "") {
          const value = labelModifier(rawValue);
          distribution[value] = (distribution[value] || 0) + 1;
          totalValid++;
        }
      });

      return Object.entries(distribution)
        .map(([name, count]) => ({
          name,
          count,
          percentage: totalValid > 0 ? ((count / totalValid) * 100).toFixed(1) : 0
        }))
        .sort((a, b) => b.count - a.count);
    }

    // --- Render-Prozesse ---
    function renderChartsAndKPIs() {
      if (globalData.length === 0) return;

      // 1. KPI-Berechnungen
      const totalCount = globalData.length;
      const roleDistribution = processDistribution(globalData, "role");
      const langDistribution = processDistribution(globalData, "lang");
      // Themen-Namen kosmetisch aufbereiten
      const themeDistribution = processDistribution(globalData, "theme_number", (val) => `Thema ${val}`);

      const topRole = roleDistribution[0] ? roleDistribution[0].name : "Keine";

      // KPI Anzeige
      kpiTotal.textContent = totalCount.toLocaleString();
      kpiRole.textContent = topRole;
      kpiNewUsers.textContent = calculateNewUsers(globalData, selectedHours).toLocaleString();

      // Charts rendern
      renderHorizontalChart(langChartContainer, langDistribution);
      renderHorizontalChart(roleChartContainer, roleDistribution);
      renderHorizontalChart(themeChartContainer, themeDistribution);
    }

    function renderHorizontalChart(container, dataset) {
      container.innerHTML = "";
      if (dataset.length === 0) {
        container.innerHTML = "<p style='color: var(--text-muted); font-size: 0.875rem;'>Keine Daten.</p>";
        return;
      }

      // Nur Top-8 Einträge darstellen für ein sauberes Interface
      dataset.slice(0, 8).forEach(item => {
        const row = document.createElement("div");
        row.className = "chart-row";
        row.innerHTML = `
          <span class="chart-label" title="${item.name}">${item.name}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width: 0%;"></div>
          </div>
          <span class="chart-percent">${item.percentage}%</span>
        `;
        container.appendChild(row);

        // Sanfte CSS-Transition triggern
        setTimeout(() => {
          const fill = row.querySelector(".bar-fill");
          if (fill) fill.style.width = `${item.percentage}%`;
        }, 50);
      });
    }

    // --- API-Abfrage ---
    async function fetchDashboardData() {
      try {
        const { data, error } = await supabaseInstance
          .from("onboarding_events")
          .select("*");

        if (error) throw error;

        globalData = data || [];

        if (globalData.length === 0) {
          spinner.classList.add("hidden");
          statusText.textContent = "Keine Daten in der Tabelle vorhanden.";
          return;
        }

        renderChartsAndKPIs();

        statusArea.classList.add("hidden");
        dashboardContent.classList.remove("hidden");

      } catch (err) {
        console.error("Datenverarbeitungsfehler:", err);
        spinner.classList.add("hidden");
        statusText.innerHTML = `
          <div style="padding: 1rem; background-color: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; border-radius: 0.375rem; text-align: center; max-width: 500px;">
            <strong>Verbindungsfehler:</strong><br>${err.message}
          </div>`;
      }
    }

    // --- Realtime Subscription ---
    function setupRealtime() {
      supabaseInstance
        .channel("realtime-onboarding")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "onboarding_events" },
          () => {
            fetchDashboardData();
          }
        )
        .subscribe();
    }

    // --- Event Listener für interaktive Zeitumschaltung ---
    document.querySelectorAll(".btn-time").forEach(btn => {
      btn.addEventListener("click", (e) => {
        document.querySelectorAll(".btn-time").forEach(b => b.classList.remove("active"));
        e.target.classList.add("active");
        
        selectedHours = parseInt(e.target.getAttribute("data-hours"), 10);
        kpiNewUsers.textContent = calculateNewUsers(globalData, selectedHours).toLocaleString();
      });
    });

    // --- Initialisierung ---
    function init() {
      try {
        supabaseInstance = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        fetchDashboardData();
        setupRealtime();
      } catch (e) {
        spinner.classList.add("hidden");
        statusText.textContent = "Initialisierungsfehler: " + e.message;
      }
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
